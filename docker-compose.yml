services:
  db:
    image: mysql:8.0
    container_name: trantuankiet_db
    environment:
      MYSQL_DATABASE: trantuankiet
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    ports:
      - "3307:3306" # Đổi cổng host thành 3307 để tránh xung đột với Laragon (3306)
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    image: tuankietdev0811/myprofile:v3
    container_name: trantuankiet_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/trantuankiet?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: user_password
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
